<svg width="100%" height="100" viewBox="0 0 500 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .btn { transition: all 0.35s cubic-bezier(0.23,1,0.32,1); cursor: pointer; }
      .btn:hover { transform: translateY(-3px) scale(1.03); }
      .icon { transition: transform 0.35s ease; }
      .btn:hover .icon { transform: scale(1.15); }
    </style>
  </defs>

  <g class="btn">
    <rect x="20" y="20" width="200" height="56" rx="28" fill="#0d1117" stroke="#EA4335" stroke-width="1.5"/>
    <circle class="icon" cx="60" cy="48" r="16" fill="#EA4335" opacity="0.15"/>
    <image href="https://img.shields.io/badge/Gmail-EA4335?style=flat-square&amp;logo=gmail&amp;logoColor=white" x="52" y="40" height="18"/>
    <text x="90" y="53" fill="#e6edf3" font-size="13" font-family="system-ui,sans-serif" font-weight="600">abdulazizbaratov12@gmail.com</text>
  </g>

  <g class="btn">
    <rect x="260" y="20" width="200" height="56" rx="28" fill="#0d1117" stroke="#229ED9" stroke-width="1.5"/>
    <circle class="icon" cx="300" cy="48" r="16" fill="#229ED9" opacity="0.15"/>
    <image href="https://img.shields.io/badge/Telegram-229ED9?style=flat-square&amp;logo=telegram&amp;logoColor=white" x="292" y="40" height="18"/>
    <text x="330" y="53" fill="#e6edf3" font-size="13" font-family="system-ui,sans-serif" font-weight="600">@Pathfi1nder</text>
  </g>
</svg>
