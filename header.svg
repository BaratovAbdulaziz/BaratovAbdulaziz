    </circle>
    <circle cx="420" cy="180" r="1.2" fill="#DA291C" opacity="0.2">
      <animate attributeName="cx" values="420;430;415;425;420" dur="6s" repeatCount="indefinite" />
      <animate attributeName="cy" values="180;170;190;175;180" dur="5.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="480" cy="180" r="1.2" fill="#DA291C" opacity="0.2">
      <animate attributeName="cx" values="480;490;475;485;480" dur="5.5s" repeatCount="indefinite" />
      <animate attributeName="cy" values="180;170;190;175;180" dur="6s" repeatCount="indefinite" />
    </circle>
    <circle cx="390" cy="90" r="0.8" fill="#DA291C" opacity="0.15">
      <animate attributeName="cx" values="390;395;385;392;390" dur="7s" repeatCount="indefinite" />
      <animate attributeName="cy" values="90;85;95;88;90" dur="6s" repeatCount="indefinite" />
