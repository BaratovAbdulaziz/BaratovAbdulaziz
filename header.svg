    <circle cx="450" cy="70" r="2" fill="#DA291C" opacity="0.4">
      <animate attributeName="cx" values="450;460;440;455;450" dur="4s" repeatCount="indefinite" />
      <animate attributeName="cy" values="70;60;80;65;70" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4;0.7;0.2;0.6;0.4" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="350" cy="160" r="1" fill="#DA291C" opacity="0.25">
      <animate attributeName="cx" values="350;360;345;355;350" dur="5s" repeatCount="indefinite" />
      <animate attributeName="cy" values="160;150;170;155;160" dur="4s" repeatCount="indefinite" />
