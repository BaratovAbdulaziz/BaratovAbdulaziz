    </circle>
    <circle cx="50" cy="300" r="1" fill="#DA291C" opacity="0.3">
      <animate attributeName="cy" values="300;285;300;315;300" dur="6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.3;0.1;0.4;0.15;0.3" dur="5s" repeatCount="indefinite" />
    </circle>
  </g>

  <g>
