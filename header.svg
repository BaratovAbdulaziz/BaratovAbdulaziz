<svg width="100%" height="340" viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a">
        <animate attributeName="stop-color" values="#0a0a0a;#1a0808;#0a0a0a;#0d0d0d;#0a0a0a" dur="12s" repeatCount="indefinite" />
      </stop>
      <stop offset="30%" stop-color="#121212">
        <animate attributeName="stop-color" values="#121212;#220a08;#121212;#181818;#121212" dur="10s" repeatCount="indefinite" />
      </stop>
      <stop offset="70%" stop-color="#181818">
        <animate attributeName="stop-color" values="#181818;#2a0a06;#181818;#1a1a1a;#181818" dur="14s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#0a0a0a">
        <animate attributeName="stop-color" values="#0a0a0a;#150505;#0a0a0a;#0d0d0d;#0a0a0a" dur="11s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <radialGradient id="glow1" cx="15%" cy="25%" r="45%">
      <stop offset="0%" stop-color="#DA291C" stop-opacity="0.2">
        <animate attributeName="stop-opacity" values="0.2;0.35;0.15;0.3;0.2" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="60%" stop-color="#DA291C" stop-opacity="0.05">
        <animate attributeName="stop-opacity" values="0.05;0.12;0.03;0.08;0.05" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#DA291C" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="glow2" cx="85%" cy="75%" r="40%">
      <stop offset="0%" stop-color="#DA291C" stop-opacity="0.15">
        <animate attributeName="stop-opacity" values="0.15;0.28;0.1;0.2;0.15" dur="7s" repeatCount="indefinite" />
      </stop>
      <stop offset="60%" stop-color="#DA291C" stop-opacity="0.03">
        <animate attributeName="stop-opacity" values="0.03;0.1;0.02;0.06;0.03" dur="7s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#DA291C" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="glow3" cx="50%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#FF4433" stop-opacity="0.08">
        <animate attributeName="stop-opacity" values="0.08;0.18;0.05;0.12;0.08" dur="5s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#FF4433" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="particleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#DA291C" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#DA291C" stop-opacity="0"/>
    </radialGradient>

    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" />
    </filter>
    <filter id="bigglow">
      <feGaussianBlur stdDeviation="4" />
    </filter>
  </defs>

  <rect width="900" height="340" fill="url(#bg)" />
  <rect width="900" height="340" fill="url(#glow3)" />
  <rect width="900" height="340" fill="url(#glow1)" />
  <rect width="900" height="340" fill="url(#glow2)" />

  <g opacity="0.03">
    <animate attributeName="opacity" values="0.03;0.06;0.02;0.05;0.03" dur="8s" repeatCount="indefinite" />
    <line x1="0" y1="48" x2="900" y2="48" stroke="#DA291C" stroke-width="0.5" />
    <line x1="0" y1="96" x2="900" y2="96" stroke="#DA291C" stroke-width="0.5" />
    <line x1="0" y1="144" x2="900" y2="144" stroke="#DA291C" stroke-width="0.5" />
    <line x1="0" y1="192" x2="900" y2="192" stroke="#DA291C" stroke-width="0.5" />
    <line x1="0" y1="240" x2="900" y2="240" stroke="#DA291C" stroke-width="0.5" />
    <line x1="0" y1="288" x2="900" y2="288" stroke="#DA291C" stroke-width="0.5" />
  </g>

  <circle cx="160" cy="260" r="1" fill="none" stroke="#DA291C" stroke-width="0.5" opacity="0">
    <animate attributeName="r" values="1;80" dur="4s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.3;0" dur="4s" repeatCount="indefinite" />
