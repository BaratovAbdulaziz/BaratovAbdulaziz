      <animate attributeName="cy" values="60;40;60;80;60" dur="10s" repeatCount="indefinite" />
      <animate attributeName="cx" values="80;100;80;60;80" dur="12s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4;0.15;0.5;0.1;0.4" dur="7s" repeatCount="indefinite" />
    </circle>
    <circle cx="750" cy="240" r="3.5" fill="#DA291C" opacity="0.35">
