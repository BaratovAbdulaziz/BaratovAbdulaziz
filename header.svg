  <circle cx="740" cy="80" r="1" fill="none" stroke="#DA291C" stroke-width="0.5" opacity="0">
    <animate attributeName="r" values="1;60" dur="5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.25;0" dur="5s" repeatCount="indefinite" />
  </circle>

  <g filter="url(#softglow)">
