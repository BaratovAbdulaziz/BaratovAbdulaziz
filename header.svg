    </circle>
    <circle cx="470" cy="100" r="2" fill="#DA291C" opacity="0">
      <animate attributeName="opacity" values="0;0;0;0;0.6;0" dur="5s" begin="2s" repeatCount="indefinite" />
      <animate attributeName="r" values="2;2;2;2;6;2" dur="5s" begin="2s" repeatCount="indefinite" />
    </circle>
  </g>

  <g filter="url(#bigglow)" opacity="0.4">
    <circle cx="300" cy="50" r="20" fill="url(#particleGlow)">
      <animate attributeName="cx" values="300;320;280;310;300" dur="8s" repeatCount="indefinite" />
      <animate attributeName="cy" values="50;40;60;45;50" dur="7s" repeatCount="indefinite" />
    </circle>
    <circle cx="600" cy="50" r="15" fill="url(#particleGlow)">
      <animate attributeName="cx" values="600;580;610;590;600" dur="9s" repeatCount="indefinite" />
      <animate attributeName="cy" values="50;40;60;45;50" dur="6s" repeatCount="indefinite" />
