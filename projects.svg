<svg width="100%" height="520" viewBox="0 0 700 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .card { transition: all 0.5s cubic-bezier(0.23,1,0.32,1); }
      .card:hover { transform: translateY(-8px) scale(1.02); }
      .stack:hover .card:not(:hover) { opacity: 0.2; filter: grayscale(0.8); }
      .glow { transition: opacity 0.5s ease; }
      .card:hover .glow { opacity: 1; }
      .ctitle { transition: fill 0.3s ease; }
      .card:hover .ctitle { fill: var(--c); }
    </style>
  </defs>

  <g class="stack">
    <g class="card" transform="translate(96,96) rotate(1.5)" style="--c:#14B8A6">
      <rect x="0" y="0" width="560" height="116" rx="14" fill="#0d1117" stroke="#14B8A6" stroke-width="1" stroke-opacity="0.15"/>
      <rect class="glow" x="0" y="0" width="560" height="116" rx="14" fill="url(#g-teal)" opacity="0"/>
      <text x="24" y="32" class="ctitle" fill="#e6edf3" font-size="17" font-weight="700" font-family="system-ui,sans-serif">emotion-link-signaling</text>
      <text x="24" y="48" fill="#14B8A6" font-size="10" letter-spacing="2" font-family="system-ui,sans-serif">WebRTC · Signaling</text>
      <text x="24" y="74" fill="#8b949e" font-size="12" font-family="system-ui,sans-serif">WebSocket signaling server for WebRTC peer connections</text>
      <text x="24" y="92" fill="#8b949e" font-size="12" font-family="system-ui,sans-serif">with room management and real-time message relay.</text>
      <image href="https://img.shields.io/badge/Node.js-181818?style=flat-square&logo=nodedotjs&logoColor=DA291C" x="24" y="96" height="20"/>
      <image href="https://img.shields.io/badge/WebSocket-181818?style=flat-square&logo=socketdotio&logoColor=DA291C" x="134" y="96" height="20"/>
      <image href="https://img.shields.io/badge/View-181818?style=flat-square&logo=github&logoColor=DA291C" x="310" y="96" height="20"/>
    </g>

    <g class="card" transform="translate(64,64) rotate(-1)" style="--c:#3B82F6">
      <rect x="0" y="0" width="560" height="116" rx="14" fill="#0d1117" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.15"/>
      <rect class="glow" x="0" y="0" width="560" height="116" rx="14" fill="url(#g-blue)" opacity="0"/>
      <text x="24" y="32" class="ctitle" fill="#e6edf3" font-size="17" font-weight="700" font-family="system-ui,sans-serif">no-borders</text>
      <text x="24" y="48" fill="#3B82F6" font-size="10" letter-spacing="2" font-family="system-ui,sans-serif">Networking · KVM</text>
      <text x="24" y="74" fill="#8b949e" font-size="12" font-family="system-ui,sans-serif">Cross-platform KVM switch — control multiple computers</text>
      <text x="24" y="92" fill="#8b949e" font-size="12" font-family="system-ui,sans-serif">with one keyboard and mouse over TCP/UDP with auto-discovery.</text>
      <image href="https://img.shields.io/badge/Python-181818?style=flat-square&logo=python&logoColor=DA291C" x="24" y="96" height="20"/>
      <image href="https://img.shields.io/badge/View-181818?style=flat-square&logo=github&logoColor=DA291C" x="134" y="96" height="20"/>
    </g>

    <g class="card" transform="translate(32,32) rotate(0.5)" style="--c:#A855F7">
      <rect x="0" y="0" width="560" height="116" rx="14" fill="#0d1117" stroke="#A855F7" stroke-width="1" stroke-opacity="0.15"/>
      <rect class="glow" x="0" y="0" width="560" height="116" rx="14" fill="url(#g-purple)" opacity="0"/>
      <text x="24" y="32" class="ctitle" fill="#e6edf3" font-size="17" font-weight="700" font-family="system-ui,sans-serif">ridges</text>
      <text x="24" y="48" fill="#A855F7" font-size="10" letter-spacing="2" font-family="system-ui,sans-serif">AI · Developer Tools</text>
      <text x="24" y="74" fill="#8b949e" font-size="12" font-family="system-ui,sans-serif">AI coding agent powered by OpenRouter. Bug localization,</text>
      <text x="24" y="92" fill="#8b949e" font-size="12" font-family="system-ui,sans-serif">patch generation, and git-aware code repair using LLM cascading.</text>
      <image href="https://img.shields.io/badge/Python-181818?style=flat-square&logo=python&logoColor=DA291C" x="24" y="96" height="20"/>
      <image href="https://img.shields.io/badge/OpenRouter-181818?style=flat-square&logo=openai&logoColor=DA291C" x="134" y="96" height="20"/>
      <image href="https://img.shields.io/badge/View-181818?style=flat-square&logo=github&logoColor=DA291C" x="310" y="96" height="20"/>
    </g>

    <g class="card" transform="translate(0,0) rotate(-0.5)" style="--c:#DA291C">
      <rect x="0" y="0" width="560" height="116" rx="14" fill="#0d1117" stroke="#DA291C" stroke-width="1" stroke-opacity="0.15"/>
      <rect class="glow" x="0" y="0" width="560" height="116" rx="14" fill="url(#g-red)" opacity="0"/>
      <text x="24" y="32" class="ctitle" fill="#e6edf3" font-size="17" font-weight="700" font-family="system-ui,sans-serif">split-evenly</text>
      <text x="24" y="48" fill="#DA291C" font-size="10" letter-spacing="2" font-family="system-ui,sans-serif">Full-stack · Finance</text>
      <text x="24" y="74" fill="#8b949e" font-size="12" font-family="system-ui,sans-serif">Full-stack expense splitting app — React + TypeScript</text>
      <text x="24" y="92" fill="#8b949e" font-size="12" font-family="system-ui,sans-serif">front-end with Supabase backend and Tailwind CSS.</text>
      <image href="https://img.shields.io/badge/React-181818?style=flat-square&logo=react&logoColor=DA291C" x="24" y="96" height="20"/>
      <image href="https://img.shields.io/badge/TypeScript-181818?style=flat-square&logo=typescript&logoColor=DA291C" x="104" y="96" height="20"/>
      <image href="https://img.shields.io/badge/Supabase-181818?style=flat-square&logo=supabase&logoColor=DA291C" x="214" y="96" height="20"/>
      <image href="https://img.shields.io/badge/Tailwind-181818?style=flat-square&logo=tailwindcss&logoColor=DA291C" x="314" y="96" height="20"/>
      <image href="https://img.shields.io/badge/View-181818?style=flat-square&logo=github&logoColor=DA291C" x="414" y="96" height="20"/>
    </g>
  </g>

  <defs>
    <linearGradient id="g-red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="30%" stop-color="transparent"/>
      <stop offset="55%" stop-color="rgba(218,41,28,0.12)"/>
      <stop offset="80%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="g-purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="30%" stop-color="transparent"/>
      <stop offset="55%" stop-color="rgba(168,85,247,0.12)"/>
      <stop offset="80%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="g-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="30%" stop-color="transparent"/>
      <stop offset="55%" stop-color="rgba(59,130,246,0.12)"/>
      <stop offset="80%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="g-teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="30%" stop-color="transparent"/>
      <stop offset="55%" stop-color="rgba(20,184,166,0.12)"/>
      <stop offset="80%" stop-color="transparent"/>
    </linearGradient>
  </defs>
</svg>
