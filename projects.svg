<svg viewBox="0 0 700 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      a { cursor: pointer; }
      a:hover .card-bg { stroke-opacity: 0.5; }
      a:hover .card-title { fill: var(--c); }
      a:hover .card-glow { opacity: 1; }
    </style>
    <linearGradient id="g-teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="30%" stop-color="transparent"/>
      <stop offset="50%" stop-color="rgba(20,184,166,0.12)"/>
      <stop offset="70%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="g-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="30%" stop-color="transparent"/>
      <stop offset="50%" stop-color="rgba(59,130,246,0.12)"/>
      <stop offset="70%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="g-purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="30%" stop-color="transparent"/>
      <stop offset="50%" stop-color="rgba(168,85,247,0.12)"/>
      <stop offset="70%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="g-red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="30%" stop-color="transparent"/>
      <stop offset="50%" stop-color="rgba(218,41,28,0.12)"/>
      <stop offset="70%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-4; 0,0" dur="4.5s" repeatCount="indefinite"/>
    <a href="https://github.com/BaratovAbdulaziz/emotion-link-signaling" target="_blank">
      <g transform="translate(96,96) rotate(1.5)" style="--c:#14B8A6">
        <rect class="card-bg" x="0" y="0" width="560" height="116" rx="14" fill="#0d1117" stroke="#14B8A6" stroke-width="1" stroke-opacity="0.15"/>
        <rect class="card-glow" x="0" y="0" width="560" height="116" rx="14" fill="url(#g-teal)" opacity="0"/>
        <text class="card-title" x="24" y="32" fill="#e6edf3" font-size="17" font-weight="700" font-family="system-ui,sans-serif">emotion-link-signaling</text>
        <text x="24" y="48" fill="#14B8A6" font-size="10" letter-spacing="2" font-family="system-ui,sans-serif">WebRTC · Signaling</text>
        <text x="24" y="72" fill="#8b949e" font-size="12" font-family="system-ui,sans-serif">WebSocket signaling server for WebRTC peer connections</text>
        <text x="24" y="90" fill="#8b949e" font-size="12" font-family="system-ui,sans-serif">with room management and real-time message relay.</text>
        <rect x="24" y="92" width="64" height="20" rx="4" fill="#151515"/>
        <text x="32" y="106" fill="#14B8A6" font-size="10" font-family="system-ui,sans-serif" font-weight="600">Node.js</text>
        <rect x="96" y="92" width="76" height="20" rx="4" fill="#151515"/>
        <text x="104" y="106" fill="#14B8A6" font-size="10" font-family="system-ui,sans-serif" font-weight="600">WebSocket</text>
        <rect x="180" y="92" width="58" height="20" rx="4" fill="#151515"/>
        <text x="188" y="106" fill="#14B8A6" font-size="10" font-family="system-ui,sans-serif" font-weight="600">Source</text>
      </g>
    </a>
  </g>

  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-4; 0,0" dur="4.8s" begin="0.3s" repeatCount="indefinite"/>
    <a href="https://github.com/BaratovAbdulaziz/no-borders" target="_blank">
      <g transform="translate(64,64) rotate(-1)" style="--c:#3B82F6">
        <rect class="card-bg" x="0" y="0" width="560" height="116" rx="14" fill="#0d1117" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.15"/>
        <rect class="card-glow" x="0" y="0" width="560" height="116" rx="14" fill="url(#g-blue)" opacity="0"/>
        <text class="card-title" x="24" y="32" fill="#e6edf3" font-size="17" font-weight="700" font-family="system-ui,sans-serif">no-borders</text>
        <text x="24" y="48" fill="#3B82F6" font-size="10" letter-spacing="2" font-family="system-ui,sans-serif">Networking · KVM</text>
        <text x="24" y="72" fill="#8b949e" font-size="12" font-family="system-ui,sans-serif">Cross-platform KVM switch — control multiple computers</text>
        <text x="24" y="90" fill="#8b949e" font-size="12" font-family="system-ui,sans-serif">with one keyboard and mouse over TCP/UDP with auto-discovery.</text>
        <rect x="24" y="92" width="54" height="20" rx="4" fill="#151515"/>
        <text x="32" y="106" fill="#3B82F6" font-size="10" font-family="system-ui,sans-serif" font-weight="600">Python</text>
        <rect x="86" y="92" width="58" height="20" rx="4" fill="#151515"/>
        <text x="94" y="106" fill="#3B82F6" font-size="10" font-family="system-ui,sans-serif" font-weight="600">Source</text>
      </g>
    </a>
  </g>

  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-4; 0,0" dur="5.1s" begin="0.6s" repeatCount="indefinite"/>
    <a href="https://github.com/BaratovAbdulaziz/ridges" target="_blank">
      <g transform="translate(32,32) rotate(0.5)" style="--c:#A855F7">
        <rect class="card-bg" x="0" y="0" width="560" height="116" rx="14" fill="#0d1117" stroke="#A855F7" stroke-width="1" stroke-opacity="0.15"/>
        <rect class="card-glow" x="0" y="0" width="560" height="116" rx="14" fill="url(#g-purple)" opacity="0"/>
        <text class="card-title" x="24" y="32" fill="#e6edf3" font-size="17" font-weight="700" font-family="system-ui,sans-serif">ridges</text>
        <text x="24" y="48" fill="#A855F7" font-size="10" letter-spacing="2" font-family="system-ui,sans-serif">AI · Developer Tools</text>
        <text x="24" y="72" fill="#8b949e" font-size="12" font-family="system-ui,sans-serif">AI coding agent powered by OpenRouter. Bug localization,</text>
        <text x="24" y="90" fill="#8b949e" font-size="12" font-family="system-ui,sans-serif">patch generation, and git-aware code repair using LLM cascading.</text>
        <rect x="24" y="92" width="54" height="20" rx="4" fill="#151515"/>
        <text x="32" y="106" fill="#A855F7" font-size="10" font-family="system-ui,sans-serif" font-weight="600">Python</text>
        <rect x="86" y="92" width="82" height="20" rx="4" fill="#151515"/>
        <text x="94" y="106" fill="#A855F7" font-size="10" font-family="system-ui,sans-serif" font-weight="600">OpenRouter</text>
        <rect x="176" y="92" width="58" height="20" rx="4" fill="#151515"/>
        <text x="184" y="106" fill="#A855F7" font-size="10" font-family="system-ui,sans-serif" font-weight="600">Source</text>
      </g>
    </a>
  </g>

  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-4; 0,0" dur="4.2s" begin="0.9s" repeatCount="indefinite"/>
    <a href="https://github.com/BaratovAbdulaziz/split-evenly" target="_blank">
      <g transform="translate(0,0) rotate(-0.5)" style="--c:#DA291C">
        <rect class="card-bg" x="0" y="0" width="560" height="116" rx="14" fill="#0d1117" stroke="#DA291C" stroke-width="1" stroke-opacity="0.15"/>
        <rect class="card-glow" x="0" y="0" width="560" height="116" rx="14" fill="url(#g-red)" opacity="0"/>
        <text class="card-title" x="24" y="32" fill="#e6edf3" font-size="17" font-weight="700" font-family="system-ui,sans-serif">split-evenly</text>
        <text x="24" y="48" fill="#DA291C" font-size="10" letter-spacing="2" font-family="system-ui,sans-serif">Full-stack · Finance</text>
        <text x="24" y="72" fill="#8b949e" font-size="12" font-family="system-ui,sans-serif">Full-stack expense splitting app — React + TypeScript</text>
        <text x="24" y="90" fill="#8b949e" font-size="12" font-family="system-ui,sans-serif">front-end with Supabase backend and Tailwind CSS.</text>
        <rect x="24" y="92" width="50" height="20" rx="4" fill="#151515"/>
        <text x="32" y="106" fill="#DA291C" font-size="10" font-family="system-ui,sans-serif" font-weight="600">React</text>
        <rect x="82" y="92" width="78" height="20" rx="4" fill="#151515"/>
        <text x="90" y="106" fill="#DA291C" font-size="10" font-family="system-ui,sans-serif" font-weight="600">TypeScript</text>
        <rect x="168" y="92" width="76" height="20" rx="4" fill="#151515"/>
        <text x="176" y="106" fill="#DA291C" font-size="10" font-family="system-ui,sans-serif" font-weight="600">Supabase</text>
        <rect x="252" y="92" width="64" height="20" rx="4" fill="#151515"/>
        <text x="260" y="106" fill="#DA291C" font-size="10" font-family="system-ui,sans-serif" font-weight="600">Tailwind</text>
        <rect x="324" y="92" width="58" height="20" rx="4" fill="#151515"/>
        <text x="332" y="106" fill="#DA291C" font-size="10" font-family="system-ui,sans-serif" font-weight="600">Source</text>
      </g>
    </a>
  </g>
</svg>
